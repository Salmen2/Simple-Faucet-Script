name: PHP Lint

on:
  push:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Check syntax
        run: find . -name "*.php" -not -path "./.git/*" -exec php -l {} \;
